{% extends "layout.html" %}

{% block content %}


<ul>
{% for announcement in announcements %}

<li>
    <h2 id="title">
        <a href="/announcements/{{ announcement.id }}">
             {{ announcement.title }}
        </a>
    </h2>

    <p>{{ announcement.content }}</p>
    <p>{{ announcement.date }}</p>
    <p>{{ announcement.author }}</p>

</li>

<hr>

{% endfor %}
</ul>

{% endblock content %}
